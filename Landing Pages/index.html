<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto Increíble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>Descubre el Producto que Todos Quieren</h1>
      <p>
        Calidad, precio y resultados en un solo lugar.
      </p>

      <a href="#formulario" class="btn">
        Solicitar Información
      </a>
    </div>
  </section>

  <section class="benefits">
    <div class="card">
      <h2>Alta Calidad</h2>
      <p>Materiales y servicio premium.</p>
    </div>

    <div class="card">
      <h2>Entrega Rápida</h2>
      <p>Recibe tu pedido fácilmente.</p>
    </div>

    <div class="card">
      <h2>Garantía</h2>
      <p>Confianza y soporte asegurado.</p>
    </div>
  </section>

  <section class="product">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30"
         alt="Producto">
  </section>

  <section class="form-section" id="formulario">
    <h2>Solicita Más Información</h2>

    <form id="leadForm">

      <input type="text"
             placeholder="Nombre"
             required>

      <input type="email"
             placeholder="Correo"
             required>

      <input type="tel"
             placeholder="Teléfono"
             required>

      <textarea placeholder="Mensaje"></textarea>

      <button type="submit">
        Enviar
      </button>

    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
